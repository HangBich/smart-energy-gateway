apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: smart-energy
      defaultBucket: energy_data
      tlsSkipVerify: true
    secureJsonData:
      token: energy-super-secret-token-2026
    isDefault: true
    editable: true
